vigil:
  jwt:
    secret: test-secret-key-minimum-32-chars-long
    access-ttl: 15m
    refresh-ttl: 7d
  filter:
    enabled: true
    public-paths:
      - /public/**
      - /health
      - /auth/**
  blacklist:
    enabled: true
  tenant:
    enabled: true
  protection:
    enabled: true
    max-attempts: 3

