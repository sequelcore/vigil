name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx2g
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Validate tag format
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "Tag ${GITHUB_REF_NAME} is not a semantic version (v*.*.*)"
            exit 1
          fi

      - name: Build
        run: ./gradlew build

  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx2g
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Install Doppler CLI
        run: curl -Ls https://cli.doppler.com/install.sh | sudo sh

      - name: Load secrets from Doppler
        run: |
          echo "MAVEN_USERNAME=$(doppler secrets get MAVEN_USERNAME --plain --project sequel-core --config prd)" >> $GITHUB_ENV
          echo "MAVEN_PASSWORD=$(doppler secrets get MAVEN_PASSWORD --plain --project sequel-core --config prd)" >> $GITHUB_ENV
          echo "GPG_PASSPHRASE=$(doppler secrets get GPG_PASSPHRASE --plain --project sequel-core --config prd)" >> $GITHUB_ENV
          doppler secrets get GPG_PRIVATE_KEY --plain --project sequel-core --config prd > /tmp/gpg_key.asc
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Import GPG key
        run: gpg --batch --import /tmp/gpg_key.asc

      - name: Publish to Maven Central
        run: ./gradlew publish

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
