name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx2g
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Validate tag format
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "Tag ${GITHUB_REF_NAME} is not a semantic version (v*.*.*)"
            exit 1
          fi

      - name: Build
        run: ./gradlew build

  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx2g
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Fetch secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v1.3.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: sequel-core
          doppler-config: prd
          inject-env-vars: true

      - name: Verify secrets are loaded
        run: |
          echo "MAVEN_USERNAME is set: $([[ -n "$MAVEN_USERNAME" ]] && echo 'yes' || echo 'no')"
          echo "MAVEN_PASSWORD is set: $([[ -n "$MAVEN_PASSWORD" ]] && echo 'yes' || echo 'no')"
          echo "GPG_PRIVATE_KEY is set: $([[ -n "$GPG_PRIVATE_KEY" ]] && echo 'yes' || echo 'no')"
          echo "GPG_PASSPHRASE is set: $([[ -n "$GPG_PASSPHRASE" ]] && echo 'yes' || echo 'no')"

      - name: Publish to Maven Central
        run: ./gradlew publish --info

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
